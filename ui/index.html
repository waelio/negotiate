<!doctype html>
<!--
  Negotiate UI — Vue 3 + Quasar (UMD, no build step).
  Keep all Quasar-related CDN tags pinned to the SAME version (@2.20.1).
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Negotiate — You and two AIs</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons" rel="stylesheet" type="text/css"/>
<link href="https://cdn.jsdelivr.net/npm/quasar@2.20.1/dist/quasar.prod.css" rel="stylesheet" type="text/css"/>

<style>
  :root {
    /* Quasar brand palette */
    --q-primary: #6366f1;
    --q-secondary: #818cf8;
    --q-positive: #22c55e;
    --q-negative: #f43f5e;
    --q-info: #6366f1;
    --q-warning: #f59e0b;
    --q-dark: #1a1a28;
    --q-dark-page: #0a0a0f;

    /* App palette */
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a28;
    --border: #2a2a40;
    --a-color: #6366f1;
    --a-glow: #6366f130;
    --b-color: #f43f5e;
    --b-glow: #f43f5e30;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #22c55e;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .app-header {
    width: 100%;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .app-header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .app-header h1 span { color: var(--a-color); }
  .badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 99px;
    background: var(--a-glow);
    color: var(--a-color);
    border: 1px solid #6366f144;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .lang-switch {
    margin-inline-start: auto;
    display: flex;
    gap: 0.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.2rem;
  }
  .lang-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.3rem 0.7rem;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    min-height: 32px;
  }
  .lang-btn:hover { color: var(--text); }
  .lang-btn.active { background: var(--a-color); color: #fff; }

  .app-main {
    width: 100%;
    max-width: 1200px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .setup-card h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 0; }
  .setup-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.5; margin: 0; }

  .field-row { display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 200px; }
  .field.wide { flex: 2; }
  .field-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  /* Quasar input theming to match the dark surface */
  .q-field--filled .q-field__control { border-radius: 10px; background: var(--card); }
  .q-field--filled .q-field__control:before { border-bottom: 1px solid var(--border); }
  .neg-input { font-size: 0.9rem; }

  .library-grid { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .library-chip {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.55rem 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    flex: 1 1 220px;
    max-width: 100%;
    transition: border-color 0.2s, background 0.2s;
  }
  .library-chip:hover { border-color: var(--a-color); }
  .library-chip.selected { border-color: var(--a-color); background: var(--a-glow); }
  .library-chip strong { display: block; font-size: 0.82rem; margin-bottom: 0.15rem; }
  .library-chip span { font-size: 0.72rem; color: var(--muted); line-height: 1.35; }
  .muted-note { font-size: 0.8rem; color: var(--muted); margin: 0; }

  .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .cta-primary {
    background: linear-gradient(135deg, var(--a-color), #818cf8) !important;
    color: #fff !important;
    box-shadow: 0 0 24px var(--a-glow);
  }
  .rounds-badge { margin-inline-start: auto; font-weight: 600; }

  .status-banner { font-size: 1rem; line-height: 1.4; border-radius: 8px; }
  .status-banner.working { background: #6366f120; border: 1px solid var(--a-color); color: var(--text); }
  .status-banner.error { background: #f43f5e20; border: 1px solid var(--b-color); color: #fecdd3; }

  .session-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 0.8rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .session-info .info-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .session-info .info-item span:first-child { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .session-info .info-item span:last-child { font-family: monospace; color: var(--text); }

  .arena { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 700px) { .arena { grid-template-columns: 1fr; } }

  .agent-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 400px;
  }
  .agent-panel.a { border-color: #6366f144; }
  .agent-panel.b { border-color: #f43f5e44; }

  .agent-header { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); }
  .agent-panel.a .agent-header { background: linear-gradient(135deg, var(--a-glow), transparent); }
  .agent-panel.b .agent-header { background: linear-gradient(135deg, var(--b-glow), transparent); }

  .agent-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
  .agent-panel.a .agent-avatar { background: var(--a-color); color: #fff; box-shadow: 0 0 12px var(--a-glow); }
  .agent-panel.b .agent-avatar { background: var(--b-color); color: #fff; box-shadow: 0 0 12px var(--b-glow); }

  .agent-info h3 { font-size: 0.95rem; font-weight: 600; margin: 0; }
  .agent-info p { font-size: 0.75rem; color: var(--muted); margin: 0; }

  .agent-header-actions { margin-inline-start: auto; display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
  .copy-btn.copied { color: var(--success) !important; }

  .agent-status { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; flex-shrink: 0; }
  .agent-status.thinking { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1s infinite; }
  .agent-status.done { background: var(--success); box-shadow: 0 0 8px var(--success); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .messages { flex: 1; padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; }
  .message {
    background: var(--card);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    font-size: 0.875rem;
    line-height: 1.6;
    border: 1px solid var(--border);
    animation: fadeUp 0.3s ease;
  }
  .agent-panel.a .message { border-inline-start: 3px solid var(--a-color); }
  .agent-panel.b .message { border-inline-start: 3px solid var(--b-color); }
  .message-text { white-space: pre-wrap; word-break: break-word; }
  .round-tag { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .thinking-indicator { padding: 0.5rem 0.25rem; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; color: var(--muted); padding: 2rem; text-align: center; }
  .empty-state .icon { font-size: 2rem; opacity: 0.4; }
  .empty-state p { font-size: 0.8rem; margin: 0; }

  #pdfExportHost { position: fixed; left: -10000px; top: 0; width: 210mm; background: #fff; pointer-events: none; visibility: hidden; }
</style>
</head>
<body>

<div id="q-app"></div>
<div id="pdfExportHost" aria-hidden="true"></div>

<!-- Vue 3 template for the root component -->
<script type="text/x-template" id="app-template">
  <div class="app-shell">
    <header class="app-header">
      <h1>⚡ <span>Negotiate</span></h1>
      <span class="badge">{{ t('badge') }}</span>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" class="lang-btn" :class="{ active: locale === 'en' }" @click="setLocale('en')">EN</button>
        <button type="button" class="lang-btn" :class="{ active: locale === 'he' }" @click="setLocale('he')">עברית</button>
      </div>
    </header>

    <main class="app-main">
      <div class="setup-card">
        <h2>{{ t('setupTitle') }}</h2>
        <p class="setup-desc">{{ t('setupDesc') }}</p>

        <div class="field-row">
          <div class="field wide">
            <label class="field-label">{{ t('goalLabel') }}</label>
            <q-input dark filled dense class="neg-input" v-model="goal" :placeholder="t('goalPh')" />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field-label">{{ t('personaALabel') }}</label>
            <q-input dark filled type="textarea" rows="3" class="neg-input" v-model="personaA" :placeholder="t('personaAPh')" />
          </div>
          <div class="field">
            <label class="field-label">{{ t('personaBLabel') }}</label>
            <q-input dark filled type="textarea" rows="3" class="neg-input" v-model="personaB" :placeholder="t('personaBPh')" />
          </div>
        </div>

        <div class="field">
          <label class="field-label">{{ t('librariesLabel') }}</label>
          <div class="library-grid">
            <p v-if="librariesState === 'loading'" class="muted-note">{{ t('librariesLoading') }}</p>
            <p v-else-if="librariesState === 'empty'" class="muted-note">{{ t('librariesEmpty') }}</p>
            <p v-else-if="librariesState === 'error'" class="muted-note">{{ t('librariesError') }}</p>
            <label
              v-for="lib in libraries"
              :key="lib.id"
              class="library-chip"
              :class="{ selected: selectedLibraryIds.includes(lib.id) }"
            >
              <q-checkbox dark dense v-model="selectedLibraryIds" :val="lib.id" color="primary" />
              <div>
                <strong>{{ lib.name }}</strong>
                <span>{{ lib.description }}</span>
              </div>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="field-label">{{ t('notesLabel') }}</label>
          <q-input dark filled type="textarea" rows="2" class="neg-input" v-model="libraryContext" :placeholder="t('notesPh')" />
        </div>

        <q-banner v-if="banner" dense rounded class="status-banner" :class="banner.kind" role="status" aria-live="polite">
          {{ banner.text }}
        </q-banner>

        <div class="controls">
          <q-btn unelevated no-caps class="cta-primary" icon="play_arrow" :label="t('start')" :disable="startDisabled" @click="startNegotiation" />
          <q-btn outline no-caps color="primary" icon="reply" :label="t('continue')" :disable="continueDisabled" @click="continueNegotiation" />
          <q-btn outline no-caps color="primary" icon="picture_as_pdf" :label="t('exportPdf')" :disable="exportDisabled" @click="exportNegotiationPdf">
            <q-tooltip>{{ t('exportPdfTitle') }}</q-tooltip>
          </q-btn>
          <q-btn flat no-caps color="negative" icon="close" :label="t('reset')" @click="resetAll" />
          <q-badge v-if="round > 0" class="rounds-badge" color="positive" text-color="dark" :label="t('round', { n: round })" />
        </div>
      </div>

      <div class="session-info" v-if="sessionInfoVisible">
        <div class="info-item"><span>{{ t('sessionId') }}</span><span>{{ infoSessionId }}</span></div>
        <div class="info-item"><span>{{ t('status') }}</span><span>{{ infoStatus }}</span></div>
        <div class="info-item"><span>{{ t('completed') }}</span><span>{{ infoCompleted }}</span></div>
      </div>

      <div class="arena">
        <div class="agent-panel a">
          <div class="agent-header">
            <div class="agent-avatar">A</div>
            <div class="agent-info">
              <h3>{{ t('agentA') }}</h3>
              <p>{{ t('roleA') }}</p>
            </div>
            <div class="agent-header-actions">
              <q-btn dense flat no-caps size="sm" class="copy-btn" :class="{ copied: copiedA }"
                :label="copiedA ? t('copied') : t('copy')" :disable="!messagesA.length" @click="copySide('A')">
                <q-tooltip>{{ t('copyTitleA') }}</q-tooltip>
              </q-btn>
              <span class="agent-status" :class="statusA"></span>
            </div>
          </div>
          <div class="messages">
            <template v-if="messagesA.length || thinkingA">
              <div v-for="(m, i) in messagesA" :key="i" class="message">
                <div class="round-tag">{{ t('round', { n: m.round }) }}</div>
                <div class="message-text">{{ m.text }}</div>
              </div>
              <div v-if="thinkingA" class="thinking-indicator"><q-spinner-dots color="grey" size="28px" /></div>
            </template>
            <div v-else class="empty-state">
              <div class="icon">🤖</div>
              <p>{{ t('emptyA') }}</p>
            </div>
          </div>
        </div>

        <div class="agent-panel b">
          <div class="agent-header">
            <div class="agent-avatar">B</div>
            <div class="agent-info">
              <h3>{{ t('agentB') }}</h3>
              <p>{{ t('roleB') }}</p>
            </div>
            <div class="agent-header-actions">
              <q-btn dense flat no-caps size="sm" class="copy-btn" :class="{ copied: copiedB }"
                :label="copiedB ? t('copied') : t('copy')" :disable="!messagesB.length" @click="copySide('B')">
                <q-tooltip>{{ t('copyTitleB') }}</q-tooltip>
              </q-btn>
              <span class="agent-status" :class="statusB"></span>
            </div>
          </div>
          <div class="messages">
            <template v-if="messagesB.length || thinkingB">
              <div v-for="(m, i) in messagesB" :key="i" class="message">
                <div class="round-tag">{{ t('round', { n: m.round }) }}</div>
                <div class="message-text">{{ m.text }}</div>
              </div>
              <div v-if="thinkingB" class="thinking-indicator"><q-spinner-dots color="grey" size="28px" /></div>
            </template>
            <div v-else class="empty-state">
              <div class="icon">🤖</div>
              <p>{{ t('emptyB') }}</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>

      bBuildingPdf: 'בונה PDF…',
      bPdfFail: 'ייצוא ה-PDF נכשל: {msg}',
      bCopyFail: 'לא ניתן להעתיק ללוח. סמן את הטקסט והעתק ידנית.',
      bNeedGoal: 'אנא הזן על מה מתנהל המשא ומתן.',
      bNeedA: 'אנא תאר את סוכן A.',
      bNeedB: 'אנא תאר את סוכן B.',
      bWorking: 'עובד… שתי הבינות המלאכותיות מנהלות משא ומתן. זה עשוי להימשך עד 30 שניות. אנא המתן.',
      bWorkingNext: 'עובד… הסבב הבא. אנא המתן עד 30 שניות.',
      bNoBoth: 'השרת לא החזיר את שני הסוכנים. נסה שוב.',
      bError: 'שגיאה: {msg}',
      unknownErr: 'שגיאה לא ידועה',
      pdfRecordTitle: 'תיעוד משא ומתן',
      pdfGeneratedBy: 'הופק על ידי Negotiate ‏(waelio) · לתיעוד ולסקירה משפטית',
      pdfDisclaimer: 'מסמך זה הוא תמליל ממוחשב של סימולציית משא ומתן בסיוע בינה מלאכותית. אין בו ייעוץ משפטי, הוא אינו יוצר הסכם מחייב, ויש לבדוק אותו על ידי איש מקצוע מוסמך לפני הסתמכות בהליכים משפטיים.',
      pdfExported: 'יוצא',
      pdfStarted: 'המשא ומתן החל',
      pdfLastUpdate: 'עדכון אחרון',
      pdfRounds: 'סבבים מתועדים',
      pdfSource: 'מקור',
      pdfSubject: 'נושא',
      pdfParticipants: 'משתתפים',
      pdfRefLibraries: 'ספריות עזר',
      pdfCustomNotes: 'הערות עזר מותאמות',
      pdfNoneSelected: 'לא נבחרו',
      pdfNone: 'אין',
      pdfFullTranscript: 'תמליל מלא',
      pdfEndRecord: 'סוף התיעוד',
      pdfSession: 'הפעלה',
      pdfDash: '—',
    },
  };

  const SUPPORTED_LOCALES = Object.keys(MESSAGES);

  function detectLocale() {
    const saved = localStorage.getItem('negotiate_locale');
    if (saved && SUPPORTED_LOCALES.includes(saved)) return saved;
    const nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
    return SUPPORTED_LOCALES.includes(nav) ? nav : 'en';
  }

  function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  const { createApp, ref, computed, watch, onMounted } = Vue;

  const App = {
    template: '#app-template',
    setup() {
      const $q = Quasar.useQuasar();
      $q.dark.set(true);
      const API_BASE = 'https://negotiate-api.waelio.workers.dev';

      const locale = ref(detectLocale());
      function t(key, params) {
        const table = MESSAGES[locale.value] || MESSAGES.en;
        let str = table[key] != null ? table[key] : (MESSAGES.en[key] != null ? MESSAGES.en[key] : key);
        if (params) {
          for (const k in params) {
            str = str.split('{' + k + '}').join(params[k]);
          }
        }
        return str;
      }

      function applyLocale() {
        const rtl = MESSAGES[locale.value]._dir === 'rtl';
        document.documentElement.lang = locale.value;
        document.documentElement.dir = rtl ? 'rtl' : 'ltr';
        document.title = t('docTitle');
        try { $q.lang.rtl = rtl; } catch (e) { /* dir attribute is the primary mechanism */ }
      }
      watch(locale, applyLocale, { immediate: true });

      function setLocale(l) {
        if (!SUPPORTED_LOCALES.includes(l)) return;
        locale.value = l;
        localStorage.setItem('negotiate_locale', l);
      }

      // ----- reactive state -----
      const goal = ref('');
      const personaA = ref('');
      const personaB = ref('');
      const libraryContext = ref('');

      const libraries = ref([]);
      const selectedLibraryIds = ref([]);
      const librariesState = ref('loading'); // loading | empty | error | ready

      const messagesA = ref([]);
      const messagesB = ref([]);
      const statusA = ref('');
      const statusB = ref('');
      const thinkingA = ref(false);
      const thinkingB = ref(false);
      const copiedA = ref(false);
      const copiedB = ref(false);

      const banner = ref(null); // { text, kind }
      const round = ref(0);
      const startDisabled = ref(false);
      const continueDisabled = ref(true);
      const exportDisabled = ref(true);

      const sessionData = ref(null);
      const sessionInfoVisible = computed(() => !!sessionData.value);
      const infoSessionId = computed(() => (sessionData.value && sessionData.value.session_id) || t('pdfDash'));
      const infoStatus = computed(() => {
        if (!sessionData.value) return t('pdfDash');
        return sessionData.value.completed_at ? t('statusComplete') : t('statusInProgress');
      });
      const infoCompleted = computed(() => {
        if (!sessionData.value || !sessionData.value.completed_at) return t('pdfDash');
        return new Date(sessionData.value.completed_at).toLocaleTimeString(locale.value);
      });

      // ----- plain (non-reactive) session bookkeeping -----
      let currentSessionId = null;
      let currentSecret = null;
      let transcriptRounds = [];
      let sessionMeta = { startedAt: null, lastCompletedAt: null };

      // ----- helpers -----
      function setBanner(text, kind) { banner.value = { text, kind }; }
      function clearBanner() { banner.value = null; }

      function selectedLibraryLabels() {
        return selectedLibraryIds.value.map((id) => {
          const lib = libraries.value.find((x) => x.id === id);
          return lib ? lib.name : id;
        });
      }

      function negotiationPayload(extra) {
        const payload = {
          goal: goal.value.trim(),
          agent_a_persona: personaA.value.trim(),
          agent_b_persona: personaB.value.trim(),
          library_ids: selectedLibraryIds.value.slice(),
        };
        Object.assign(payload, extra || {});
        const ctx = libraryContext.value.trim();
        if (ctx) payload.library_context = ctx;
        return payload;
      }

      async function readError(res) {
        try {
          const e = await res.json();
          const d = e.detail != null ? e.detail : (e.error != null ? e.error : e.message);
          return typeof d === 'string' ? d : 'HTTP ' + res.status;
        } catch (_) {
          return 'HTTP ' + res.status;
        }
      }

      function formatLegalDate(iso) {
        if (!iso) return t('pdfDash');
        try {
          return new Date(iso).toLocaleString(locale.value, { dateStyle: 'full', timeStyle: 'short' });
        } catch (_) {
          return iso;
        }
      }

      async function loadLibraries() {
        try {
          const res = await fetch(API_BASE + '/libraries');
          if (!res.ok) { librariesState.value = 'error'; return; }
          const data = await res.json();
          libraries.value = data.libraries || [];
          librariesState.value = libraries.value.length ? 'ready' : 'empty';
        } catch (_) {
          librariesState.value = 'error';
        }
      }

      function updateSessionInfo(data) { sessionData.value = data; }

      function sideText(panel) {
        const arr = panel === 'A' ? messagesA.value : messagesB.value;
        return arr.map((m) => t('round', { n: m.round }) + '\n' + m.text).join('\n\n');
      }

      async function copySide(panel) {
        const text = sideText(panel).trim();
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          if (panel === 'A') { copiedA.value = true; setTimeout(() => { copiedA.value = false; }, 1500); }
          else { copiedB.value = true; setTimeout(() => { copiedB.value = false; }, 1500); }
        } catch (_) {
          setBanner(t('bCopyFail'), 'error');
        }
      }

      async function startNegotiation() {
        const g = goal.value.trim();
        const a = personaA.value.trim();
        const b = personaB.value.trim();
        if (!g) { setBanner(t('bNeedGoal'), 'error'); return; }
        if (!a) { setBanner(t('bNeedA'), 'error'); return; }
        if (!b) { setBanner(t('bNeedB'), 'error'); return; }

        setBanner(t('bWorking'), 'working');
        startDisabled.value = true;
        continueDisabled.value = true;

        messagesA.value = [];
        messagesB.value = [];
        transcriptRounds = [];
        sessionMeta = { startedAt: null, lastCompletedAt: null };
        exportDisabled.value = true;

        statusA.value = 'thinking';
        thinkingA.value = true;

        try {
          const res = await fetch(API_BASE + '/negotiate/auto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(negotiationPayload()),
          });
          if (!res.ok) throw new Error(await readError(res));

          const data = await res.json();
          if (!data.agent_a || !data.agent_b) throw new Error(t('bNoBoth'));

          thinkingA.value = false;
          statusA.value = 'done';
          messagesA.value.push({ round: 1, text: data.agent_a });

          statusB.value = 'thinking';
          thinkingB.value = true;
          await new Promise((r) => setTimeout(r, 400));
          thinkingB.value = false;
          statusB.value = 'done';
          messagesB.value.push({ round: 1, text: data.agent_b });

          currentSessionId = data.session_id;
          currentSecret = data.shared_secret;
          sessionMeta = {
            startedAt: data.completed_at || new Date().toISOString(),
            lastCompletedAt: data.completed_at || new Date().toISOString(),
          };
          transcriptRounds.push({ round: 1, agent_a: data.agent_a, agent_b: data.agent_b });
          exportDisabled.value = false;
          round.value = 1;
          updateSessionInfo(data);

          clearBanner();
          continueDisabled.value = false;
        } catch (e) {
          thinkingA.value = false;
          thinkingB.value = false;
          statusA.value = '';
          statusB.value = '';
          setBanner(t('bError', { msg: e.message }), 'error');
        }

        startDisabled.value = false;
      }

      async function continueNegotiation() {
        if (!currentSessionId) return;

        setBanner(t('bWorkingNext'), 'working');
        continueDisabled.value = true;
        startDisabled.value = true;

        statusA.value = 'thinking';
        thinkingA.value = true;

        try {
          const res = await fetch(API_BASE + '/negotiate/auto/' + currentSessionId + '/continue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(negotiationPayload({ shared_secret: currentSecret })),
          });
          if (!res.ok) throw new Error(await readError(res));

          const data = await res.json();
          if (!data.agent_a || !data.agent_b) throw new Error(t('bNoBoth'));
          const newRound = round.value + 1;

          thinkingA.value = false;
          statusA.value = 'done';
          messagesA.value.push({ round: newRound, text: data.agent_a });

          statusB.value = 'thinking';
          thinkingB.value = true;
          await new Promise((r) => setTimeout(r, 400));
          thinkingB.value = false;
          statusB.value = 'done';
          messagesB.value.push({ round: newRound, text: data.agent_b });

          sessionMeta.lastCompletedAt = data.completed_at || new Date().toISOString();
          transcriptRounds.push({ round: newRound, agent_a: data.agent_a, agent_b: data.agent_b });
          round.value = newRound;
          updateSessionInfo(data);
          clearBanner();
        } catch (e) {
          thinkingA.value = false;
          thinkingB.value = false;
          statusA.value = '';
          statusB.value = '';
          setBanner(t('bError', { msg: e.message }), 'error');
        }

        continueDisabled.value = false;
        startDisabled.value = false;
      }

      function resetAll() {
        currentSessionId = null;
        currentSecret = null;
        round.value = 0;
        transcriptRounds = [];
        sessionMeta = { startedAt: null, lastCompletedAt: null };
        messagesA.value = [];
        messagesB.value = [];
        sessionData.value = null;
        continueDisabled.value = true;
        startDisabled.value = false;
        exportDisabled.value = true;
        copiedA.value = false;
        copiedB.value = false;
        statusA.value = '';
        statusB.value = '';
        clearBanner();
      }

      function buildLegalExportHtml() {
        const goalVal = goal.value.trim();
        const pA = personaA.value.trim();
        const pB = personaB.value.trim();
        const ctx = libraryContext.value.trim();
        const libs = selectedLibraryLabels();
        const exportAt = new Date().toISOString();
        const dir = MESSAGES[locale.value]._dir;
        const dash = t('pdfDash');

        const roundsHtml = transcriptRounds.map((entry) => (
          '<section style="margin-top: 18px; border-top: 1px solid #ccc; padding-top: 14px;">' +
            '<h3 style="margin: 0 0 10px; font-size: 12pt; color: #333;">' + escHtml(t('round', { n: entry.round })) + '</h3>' +
            '<div style="margin-bottom: 12px;">' +
              '<p style="margin: 0 0 4px; font-weight: 700; font-size: 10pt; color: #4338ca;">' + escHtml(t('agentA')) + '</p>' +
              '<div dir="auto" style="padding: 10px 12px; background: #f8f8fc; border: 1px solid #ddd; border-radius: 6px; white-space: pre-wrap; word-break: break-word;">' + escHtml(entry.agent_a) + '</div>' +
            '</div>' +
            '<div>' +
              '<p style="margin: 0 0 4px; font-weight: 700; font-size: 10pt; color: #e11d48;">' + escHtml(t('agentB')) + '</p>' +
              '<div dir="auto" style="padding: 10px 12px; background: #fff5f7; border: 1px solid #ddd; border-radius: 6px; white-space: pre-wrap; word-break: break-word;">' + escHtml(entry.agent_b) + '</div>' +
            '</div>' +
          '</section>'
        )).join('');

        const librariesBlock = libs.length
          ? '<ul style="margin: 6px 0 0; padding-inline-start: 20px;">' + libs.map((l) => '<li>' + escHtml(l) + '</li>').join('') + '</ul>'
          : '<p style="margin: 6px 0 0; color: #555;">' + escHtml(t('pdfNoneSelected')) + '</p>';

        const notesBlock = ctx
          ? '<div dir="auto" style="margin-top: 8px; padding: 10px; background: #f5f5f5; border: 1px solid #ddd; white-space: pre-wrap; word-break: break-word;">' + escHtml(ctx) + '</div>'
          : '<p style="margin: 6px 0 0; color: #555;">' + escHtml(t('pdfNone')) + '</p>';

        return (
          '<div lang="' + locale.value + '" dir="' + dir + '" style="font-family: \'Helvetica Neue\', Helvetica, Arial, sans-serif; color: #111; background: #fff; padding: 28px 32px; font-size: 11pt; line-height: 1.55; text-align: ' + (dir === 'rtl' ? 'right' : 'left') + ';">' +
            '<header style="border-bottom: 2px solid #111; padding-bottom: 14px; margin-bottom: 18px;">' +
              '<h1 style="margin: 0 0 6px; font-size: 20pt; letter-spacing: -0.02em;">' + escHtml(t('pdfRecordTitle')) + '</h1>' +
              '<p style="margin: 0; font-size: 9pt; color: #555;">' + escHtml(t('pdfGeneratedBy')) + '</p>' +
            '</header>' +
            '<p style="font-size: 9pt; color: #444; margin: 0 0 18px; padding: 10px 12px; background: #fafafa; border: 1px solid #ddd;">' + escHtml(t('pdfDisclaimer')) + '</p>' +
            '<table style="width: 100%; border-collapse: collapse; font-size: 10pt; margin-bottom: 18px;"><tbody>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; width: 32%; font-weight: 600;">' + escHtml(t('sessionId')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;">' + escHtml(currentSessionId || dash) + '</td></tr>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; font-weight: 600;">' + escHtml(t('pdfExported')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;">' + escHtml(formatLegalDate(exportAt)) + '</td></tr>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; font-weight: 600;">' + escHtml(t('pdfStarted')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;">' + escHtml(formatLegalDate(sessionMeta.startedAt)) + '</td></tr>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; font-weight: 600;">' + escHtml(t('pdfLastUpdate')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;">' + escHtml(formatLegalDate(sessionMeta.lastCompletedAt)) + '</td></tr>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; font-weight: 600;">' + escHtml(t('pdfRounds')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;">' + transcriptRounds.length + '</td></tr>' +
              '<tr><td style="padding: 6px 8px; border: 1px solid #ddd; font-weight: 600;">' + escHtml(t('pdfSource')) + '</td><td style="padding: 6px 8px; border: 1px solid #ddd;" dir="ltr">' + escHtml(API_BASE) + '</td></tr>' +
            '</tbody></table>' +
            '<section style="margin-bottom: 16px;"><h2 style="margin: 0 0 8px; font-size: 12pt;">' + escHtml(t('pdfSubject')) + '</h2>' +
              '<div dir="auto" style="padding: 10px 12px; border: 1px solid #ddd; white-space: pre-wrap; word-break: break-word;">' + escHtml(goalVal) + '</div></section>' +
            '<section style="margin-bottom: 16px;"><h2 style="margin: 0 0 8px; font-size: 12pt;">' + escHtml(t('pdfParticipants')) + '</h2>' +
              '<p style="margin: 0 0 4px; font-weight: 700; font-size: 10pt;">' + escHtml(t('agentA')) + '</p>' +
              '<div dir="auto" style="padding: 10px 12px; border: 1px solid #ddd; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word;">' + escHtml(pA) + '</div>' +
              '<p style="margin: 0 0 4px; font-weight: 700; font-size: 10pt;">' + escHtml(t('agentB')) + '</p>' +
              '<div dir="auto" style="padding: 10px 12px; border: 1px solid #ddd; white-space: pre-wrap; word-break: break-word;">' + escHtml(pB) + '</div></section>' +
            '<section style="margin-bottom: 16px;"><h2 style="margin: 0 0 8px; font-size: 12pt;">' + escHtml(t('pdfRefLibraries')) + '</h2>' + librariesBlock +
              '<h3 style="margin: 14px 0 6px; font-size: 10pt;">' + escHtml(t('pdfCustomNotes')) + '</h3>' + notesBlock + '</section>' +
            '<section><h2 style="margin: 0 0 10px; font-size: 12pt;">' + escHtml(t('pdfFullTranscript')) + '</h2>' + roundsHtml + '</section>' +
            '<footer style="margin-top: 24px; padding-top: 12px; border-top: 1px solid #ccc; font-size: 8pt; color: #666;">' +
              escHtml(t('pdfEndRecord')) + ' · ' + escHtml(t('pdfSession')) + ' ' + escHtml(currentSessionId || dash) + ' · ' + escHtml(t('pdfExported')) + ' ' + escHtml(formatLegalDate(exportAt)) +
            '</footer>' +
          '</div>'
        );
      }

      async function exportNegotiationPdf() {
        if (!transcriptRounds.length) { setBanner(t('bExportEmpty'), 'error'); return; }
        if (typeof html2pdf === 'undefined') { setBanner(t('bPdfLibFail'), 'error'); return; }

        const host = document.getElementById('pdfExportHost');
        exportDisabled.value = true;
        setBanner(t('bBuildingPdf'), 'working');

        host.innerHTML = buildLegalExportHtml();
        host.style.visibility = 'visible';

        const stamp = new Date().toISOString().slice(0, 10);
        const fileId = (currentSessionId || 'session').slice(0, 12);
        const filename = 'negotiation-record-' + fileId + '-' + stamp + '.pdf';

        try {
          await html2pdf()
            .set({
              margin: [12, 12, 14, 12],
              filename: filename,
              image: { type: 'jpeg', quality: 0.95 },
              html2canvas: { scale: 2, useCORS: true, logging: false },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
              pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
            })
            .from(host.firstElementChild)
            .save();
          clearBanner();
        } catch (e) {
          setBanner(t('bPdfFail', { msg: (e && e.message) || t('unknownErr') }), 'error');
        } finally {
          host.innerHTML = '';
          host.style.visibility = 'hidden';
          exportDisabled.value = transcriptRounds.length === 0;
        }
      }

      // Old builds saved a custom API URL — ignore it so the site always works.
      localStorage.removeItem('negotiate_api_url');
      onMounted(loadLibraries);

      return {
        t, locale, setLocale,
        goal, personaA, personaB, libraryContext,
        libraries, selectedLibraryIds, librariesState,
        messagesA, messagesB, statusA, statusB, thinkingA, thinkingB,
        copiedA, copiedB, banner, round,
        startDisabled, continueDisabled, exportDisabled,
        sessionInfoVisible, infoSessionId, infoStatus, infoCompleted,
        startNegotiation, continueNegotiation, resetAll, copySide, exportNegotiationPdf,
      };
    },
  };

  const app = createApp(App);
  app.use(Quasar);
  app.mount('#q-app');
</script>
</body>
</html>
